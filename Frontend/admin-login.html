<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Mystery Bundle Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #061018;
            --bg-secondary: #07101a;
            --text-primary: #e6eef6;
            --accent: #00e07a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f9f9fc 0%, #f0f2f5 100%);
            color: #1f2937;
        }
        body.light-mode .glass {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .glass {
            background: rgba(10, 12, 15, 0.56);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .btn-primary {
            background: var(--accent);
            color: #041017;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,224,122,0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md relative">
        <!-- Theme Toggle -->
        <button id="themeToggle" class="absolute top-4 right-4 p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors">
            <i class="ri-sun-line text-yellow-400 hidden dark-icon"></i>
            <i class="ri-moon-line text-white light-icon"></i>
        </button>

        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-xl bg-green-500/20 flex items-center justify-center">
                <i class="ri-shield-keyhole-line text-green-400 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">Bundle Hub Admin</h1>
            <p class="text-gray-400">Sign in to your admin panel</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" id="email" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-green-400 transition-colors" placeholder="admin@mysterybundlehub.com" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-green-400 transition-colors" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full btn-primary py-3 rounded-lg font-semibold transition-colors">
                <i class="ri-login-box-line mr-2"></i>Sign In
            </button>
        </form>

        <div class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-lg">
            <div class="flex items-center space-x-2 text-red-400">
                <i class="ri-shield-check-line"></i>
                <span class="text-sm font-medium">Restricted Access</span>
            </div>
            <p class="text-xs text-red-400/80 mt-1">Authorized personnel only. All activities are monitored.</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = themeToggle.querySelector('.ri-sun-line');
        const moonIcon = themeToggle.querySelector('.ri-moon-line');

        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') setTheme('light');
        else setTheme('dark');

        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.contains('light-mode');
            setTheme(isLight ? 'dark' : 'light');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = e.target.querySelector('button');
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="ri-loader-4-line animate-spin mr-2"></i>Signing In...';
            button.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = 'admin.html';
                } else {
                    alert(data.message || 'Invalid credentials');
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert('Login failed. Please try again.');
                button.innerHTML = originalText;
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
