<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed - Mystery Bundle Hub</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(180deg,#061018 0%, #07101a 40%, #0b0f12 100%); 
      color: #e6eef6; 
    }
    .glass { 
      background: rgba(10,12,15,0.56); 
      backdrop-filter: blur(6px); 
      -webkit-backdrop-filter: blur(6px); 
      border: 1px solid rgba(255,255,255,0.03); 
    }
    .neon-border { 
      box-shadow: 0 6px 30px rgba(0,224,122,0.07); 
      border: 1px solid rgba(0,224,122,0.12); 
    }
  </style>
  
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="glass rounded-3xl p-8 max-w-md w-full neon-border text-center">
    <!-- Failure Icon -->
    <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-red-500/20 flex items-center justify-center">
      <i class="ri-close-circle-line text-red-500 text-4xl"></i>
    </div>
    
    <h1 class="text-3xl font-black mb-4 text-red-400">Payment Failed ❌</h1>
    
    <div class="mb-6 space-y-4">
      <p class="text-gray-300 leading-relaxed">
        We couldn't process your payment. This could be due to insufficient funds, 
        network issues, or incorrect payment details.
      </p>
      
      <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4">
        <div class="flex items-center justify-center space-x-2 text-red-400">
          <i class="ri-information-line"></i>
          <span class="text-sm">No charges were made to your account</span>
        </div>
      </div>
    </div>
    
    <div class="space-y-3">
      <button onclick="tryAgain()" class="w-full bg-gradient-to-r from-red-500 to-red-600 py-3 rounded-xl font-bold text-white">
        <i class="ri-refresh-line mr-2"></i>Try Again
      </button>
      
      <button onclick="goHome()" class="w-full glass py-3 rounded-xl font-semibold border border-white/10">
        <i class="ri-home-line mr-2"></i>Return Home
      </button>
    </div>
    
    <div class="mt-6 text-xs text-gray-500">
      Need help? Contact support@mysteryhub.com or call +233 24 680 2468
    </div>
  </div>

  <script>
    function tryAgain() {
      // Redirect back to home page where user can try again
      window.location.href = '/';
    }

    function goHome() {
      window.location.href = '/';
    }

    // Check URL for error parameters
    const urlParams = new URLSearchParams(window.location.search);
    const errorReason = urlParams.get('reason');
    
    if (errorReason) {
      const reasonElement = document.createElement('div');
      reasonElement.className = 'bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 mt-4';
      reasonElement.innerHTML = `
        <div class="flex items-center space-x-2 text-yellow-400 text-sm">
          <i class="ri-error-warning-line"></i>
          <span>Reason: ${decodeURIComponent(errorReason)}</span>
        </div>
      `;
      document.querySelector('.space-y-4').appendChild(reasonElement);
    }
  </script>
</body>
</html>
