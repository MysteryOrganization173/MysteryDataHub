<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Agent Registration - Mystery Bundle Hub</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(180deg,#061018 0%, #07101a 40%, #0b0f12 100%); 
      color: #e6eef6; 
    }
    .glass { 
      background: rgba(10,12,15,0.56); 
      backdrop-filter: blur(6px); 
      -webkit-backdrop-filter: blur(6px); 
      border: 1px solid rgba(255,255,255,0.03); 
    }
    .neon-border { 
      box-shadow: 0 6px 30px rgba(0,224,122,0.07); 
      border: 1px solid rgba(0,224,122,0.12); 
    }
    .accent { color: #00e07a; }
    .btn-green { 
      background: linear-gradient(90deg,#00e07a,#00c86b); 
      color: #041017; 
    }
  </style>
  
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <script src="./agent-coming-soon-gate.js"></script>
  <div class="max-w-md w-full">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-black/40 border border-white/5 neon-border flex items-center justify-center">
        <i class="ri-money-dollar-circle-line text-hubGreen text-2xl"></i>
      </div>
      <h1 class="text-3xl font-black">Complete Registration</h1>
      <p class="text-gray-400 mt-2">One-time payment to activate your agent account</p>
    </div>

    <div class="glass rounded-2xl p-6 neon-border">
      <!-- Order Summary -->
      <div class="bg-white/5 rounded-lg p-4 mb-6">
        <h3 class="font-bold mb-3">Order Summary</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between">
            <span class="text-gray-400">Plan:</span>
            <span class="font-semibold" id="planName">Pro Agent</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">Commission Rate:</span>
            <span class="font-semibold accent" id="commissionRate">12%</span>
          </div>
          <div class="flex justify-between border-t border-white/10 pt-2">
            <span class="text-gray-400">Total:</span>
            <span class="text-xl font-bold accent" id="totalAmount">₵25</span>
          </div>
        </div>
      </div>

      <!-- Payment Button -->
      <button onclick="processPayment()" class="w-full btn-green py-4 rounded-xl font-bold text-lg mb-4">
        <i class="ri-lock-line mr-2"></i>Pay Now - <span id="payAmount">₵25</span>
      </button>

      <div class="text-center text-sm text-gray-500">
        <p>One-time payment • Lifetime access • 30-day money back guarantee</p>
      </div>

      <!-- Benefits -->
      <div class="mt-6 space-y-3 text-sm">
        <div class="flex items-center gap-3">
          <i class="ri-checkbox-circle-line text-green-400"></i>
          <span>Instant account activation</span>
        </div>
        <div class="flex items-center gap-3">
          <i class="ri-checkbox-circle-line text-green-400"></i>
          <span>Your personal store link</span>
        </div>
        <div class="flex items-center gap-3">
          <i class="ri-checkbox-circle-line text-green-400"></i>
          <span>Start earning commissions immediately</span>
        </div>
      </div>
    </div>

    <div id="paymentMessage" class="mt-4 text-center text-sm"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const amount = urlParams.get('amount');
    const plan = urlParams.get('plan');

    document.addEventListener('DOMContentLoaded', function() {
      if (!token || !amount || !plan) {
        showError('Invalid payment link');
        return;
      }

      updateOrderSummary(plan, amount);
    });

    function updateOrderSummary(plan, amount) {
      const planNames = {
        'starter': 'Starter Agent',
        'pro': 'Pro Agent',
        'enterprise': 'Enterprise Agent'
      };

      const commissionRates = {
        'starter': '10%',
        'pro': '12%',
        'enterprise': '15%'
      };

      document.getElementById('planName').textContent = planNames[plan] || 'Agent';
      document.getElementById('commissionRate').textContent = commissionRates[plan] || '10%';
      document.getElementById('totalAmount').textContent = `₵${amount}`;
      document.getElementById('payAmount').textContent = `₵${amount}`;
    }

    async function processPayment() {
      const paymentData = {
        email: 'agent_registration@mysterybundlehub.com', // You might want to capture email
        amount: parseFloat(amount) * 100, // Convert to pesewas
        reference: 'AGENT-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6),
        metadata: {
          agent_plan: plan,
          agent_token: token
        }
      };

      try {
        showMessage('Initializing payment...', 'info');

        const response = await fetch('/api/payment/initialize-agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(paymentData)
        });

        const data = await response.json();

        if (data.status === true && data.data.authorization_url) {
          // Redirect to Paystack
          window.location.href = data.data.authorization_url;
        } else {
          throw new Error(data.message || 'Payment initialization failed');
        }
      } catch (error) {
        showMessage('Payment failed: ' + error.message, 'error');
      }
    }

    function showMessage(message, type) {
      const messageEl = document.getElementById('paymentMessage');
      messageEl.textContent = message;
      messageEl.className = `mt-4 text-center text-sm ${type === 'error' ? 'text-red-400' : 'text-green-400'}`;
    }

    function showError(message) {
      document.body.innerHTML = `
        <div class="max-w-md w-full text-center">
          <div class="glass rounded-2xl p-8 neon-border">
            <i class="ri-error-warning-line text-4xl text-red-400 mb-4"></i>
            <h1 class="text-2xl font-bold mb-4">Error</h1>
            <p class="text-gray-400 mb-6">${message}</p>
            <button onclick="window.location.href = 'login.html'" class="w-full btn-green py-3 rounded-lg font-bold">
              Return to Registration
            </button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
